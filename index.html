<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Status — Live Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2330;
    --border2: #262d3d;
    --text: #e8ecf4;
    --text-muted: #6b7491;
    --text-dim: #3d4560;
    --alive: #22c97a;
    --alive-glow: rgba(34,201,122,0.25);
    --alive-dim: #0f7a47;
    --down: #f04060;
    --down-glow: rgba(240,64,96,0.25);
    --down-dim: #7a1a28;
    --unstable: #6b7491;
    --unstable-dim: #3d4560;
    --accent: #4e7cff;
    --accent-glow: rgba(78,124,255,0.2);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 24px;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(78,124,255,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 20% at 80% 80%, rgba(34,201,122,0.04) 0%, transparent 50%);
  }

  .page-wrapper {
    max-width: 900px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .header-left h2 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(34,201,122,0.08);
    border: 1px solid rgba(34,201,122,0.2);
    border-radius: 20px;
    padding: 5px 12px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--alive);
    text-transform: uppercase;
  }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--alive);
    animation: pulse-live 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse-live {
    0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(34,201,122,0.5); }
    50% { opacity: 0.8; transform: scale(1.1); box-shadow: 0 0 0 4px rgba(34,201,122,0); }
  }

  /* Tab controls */
  .tab-row {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    width: fit-content;
  }

  .tab-btn {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    background: transparent;
    border: none;
    padding: 8px 18px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .tab-btn:hover { color: var(--text); background: var(--surface2); }

  .tab-btn.active {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  /* Service block */
  .service-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 26px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .service-card:hover { border-color: var(--border2); }

  .service-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .service-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .service-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .service-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .service-endpoint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .uptime-label {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--alive);
    letter-spacing: 0.05em;
  }

  /* Bar chart area */
  .bar-container {
    position: relative;
  }

  .bars-row {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 38px;
  }

  .bar {
    flex: 1;
    border-radius: 3px;
    position: relative;
    cursor: pointer;
    transition: filter 0.15s, transform 0.15s;
    min-width: 0;
  }

  .bar:hover { transform: scaleY(1.08); filter: brightness(1.25); }

  .bar.alive   { background: var(--alive); box-shadow: 0 0 8px rgba(34,201,122,0.3); }
  .bar.down    { background: var(--down);  box-shadow: 0 0 8px rgba(240,64,96,0.3); }
  .bar.unstable { background: var(--unstable); }

  /* Tooltip */
  .tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 12px);
    left: 50%;
    transform: translateX(-50%);
    background: #1a1f2e;
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    white-space: nowrap;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    min-width: 180px;
    pointer-events: none;
  }

  .bar:hover .tooltip { display: block; }

  .tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: var(--border2);
  }

  .tooltip-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.06em;
  }

  .tooltip-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .tooltip-status .dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }

  .tooltip-event-list {
    list-style: none;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .tooltip-event-list li {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 5px;
    line-height: 1.4;
  }

  .tooltip-event-list li:last-child { margin-bottom: 0; }

  .tooltip-event-list .ev-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: #fff;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .ev-title {
    font-weight: 500;
    color: var(--text);
  }

  /* Bar range labels */
  .bar-axis {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  /* Summary row */
  .summary-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .legend-swatch {
    width: 10px; height: 10px; border-radius: 2px;
  }

  /* Global legend */
  .global-legend {
    display: flex;
    gap: 20px;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  .global-legend .legend-item .legend-swatch { border-radius: 3px; }

  /* Incident banner */
  .incident-banner {
    background: rgba(240,64,96,0.07);
    border: 1px solid rgba(240,64,96,0.2);
    border-radius: 10px;
    padding: 12px 18px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }

  .incident-icon { font-size: 16px; }

  .incident-text strong { color: var(--down); font-weight: 600; }
  .incident-text span { color: var(--text-muted); font-size: 12px; margin-left: 8px; font-family: var(--mono); }

  /* Range view toggle for hidden views */
  .view { display: none; }
  .view.active { display: block; }
</style>
</head>
<body>

<div class="page-wrapper">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>System Monitor</h1>
      <h2>Service Availability</h2>
    </div>
    <div class="live-badge">
      <span class="live-dot"></span>
      Live
    </div>
  </div>

  <!-- Incident banner -->
  <div class="incident-banner">
    <span class="incident-icon">⚠</span>
    <div class="incident-text">
      <strong>Ongoing Incident</strong> — Payment Gateway experiencing elevated latency.
      <span>Started 2h 14m ago</span>
    </div>
  </div>

  <!-- Time range tabs -->
  <div class="tab-row">
    <button class="tab-btn active" onclick="switchView('24h', this)">24 Hours</button>
    <button class="tab-btn" onclick="switchView('72h', this)">72 Hours</button>
    <button class="tab-btn" onclick="switchView('30d', this)">30 Days</button>
  </div>

  <!-- Views -->
  <div id="view-24h" class="view active"></div>
  <div id="view-72h" class="view"></div>
  <div id="view-30d" class="view"></div>

  <!-- Legend -->
  <div class="global-legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--alive)"></div> Operational</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--down)"></div> Outage</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--unstable)"></div> Degraded</div>
  </div>

</div>

<script>
// ─────────────────────────────────────────
// DATA DEFINITIONS
// ─────────────────────────────────────────

const SERVICES = [
  { id: 'api',     name: 'Core API',         endpoint: 'api.internal / :443',      icon: '⚙', iconBg: 'rgba(78,124,255,0.15)' },
  { id: 'auth',    name: 'Auth Service',      endpoint: 'auth.internal / :8443',    icon: '🔐', iconBg: 'rgba(255,200,50,0.12)' },
  { id: 'db',      name: 'Database Cluster',  endpoint: 'db-primary.internal / :5432', icon: '🗄', iconBg: 'rgba(34,201,122,0.12)' },
  { id: 'payment', name: 'Payment Gateway',   endpoint: 'pay.internal / :443',      icon: '💳', iconBg: 'rgba(240,64,96,0.12)' },
  { id: 'cdn',     name: 'CDN / Edge',        endpoint: 'cdn.internal / :80,:443',  icon: '🌐', iconBg: 'rgba(160,100,255,0.12)' },
];

// Events per service for 24h view (bar index 0-23, 0 = oldest)
const EVENTS_24H = {
  api: [
    { bar: 4,  status: 'unstable', title: 'Elevated latency', desc: 'P99 latency spiked to 2.1s. Root cause: cold cache after deployment.', time: '19:15' },
    { bar: 11, status: 'down',     title: 'Connection timeout', desc: 'Upstream timeout from DB pool exhaustion. 3-min outage.', time: '12:02' },
    { bar: 19, status: 'unstable', title: 'High error rate', desc: '5xx error rate reached 4.2% for ~8 minutes.', time: '04:40' },
  ],
  auth: [
    { bar: 7,  status: 'unstable', title: 'Token validation delay', desc: 'JWT verification slower than normal — RSA key cache miss.', time: '16:30' },
    { bar: 22, status: 'unstable', title: 'Session store lag', desc: 'Redis session store replication lag detected at 340ms.', time: '01:10' },
  ],
  db: [
    { bar: 11, status: 'down',     title: 'Primary failover', desc: 'Automatic failover to replica-2 due to primary node unresponsive. Recovery in 4 min.', time: '12:00' },
    { bar: 12, status: 'unstable', title: 'Replication lag', desc: 'Post-failover replication lag: 22s for ~15 minutes.', time: '12:05' },
  ],
  payment: [
    { bar: 2,  status: 'unstable', title: 'Slow 3rd-party response', desc: 'External payment processor API responding at +900ms above SLA.', time: '21:05' },
    { bar: 21, status: 'down',     title: 'Webhook delivery failure', desc: 'Outbound webhook calls to merchant endpoints timed out. Queued for retry.', time: '02:20' },
  ],
  cdn: [],
};

// Generate bar status arrays
function gen24hBars(serviceId) {
  const bars = Array(24).fill('alive');
  const evs = EVENTS_24H[serviceId] || [];
  evs.forEach(e => { bars[e.bar] = e.status; });
  return bars;
}

function gen72hBars(serviceId) {
  const bars = Array(24).fill('alive');
  // Sprinkle some downs
  const downs = { api: [4,11], auth: [7], db: [11], payment: [2,21], cdn: [] };
  (downs[serviceId] || []).forEach(i => { if (i < 24) bars[i] = 'down'; });
  return bars;
}

function gen30dBars(serviceId) {
  const bars = Array(30).fill('alive');
  const downs = { api: [5,12,18], auth: [7], db: [11,12], payment: [2,21,27], cdn: [15] };
  (downs[serviceId] || []).forEach(i => { if (i < 30) bars[i] = 'down'; });
  return bars;
}

// Axis labels
function get24hAxis() {
  const now = new Date();
  const labels = [];
  for (let i = 23; i >= 0; i--) {
    const h = new Date(now - i * 3600000);
    labels.push(`${String(h.getHours()).padStart(2,'0')}:00`);
  }
  return [labels[0], labels[11], labels[23]];
}

function get72hAxis() {
  const now = new Date();
  const start = new Date(now - 72 * 3600000);
  const mid   = new Date(now - 36 * 3600000);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:00`;
  return [fmt(start), fmt(mid), 'Now'];
}

function get30dAxis() {
  const now = new Date();
  const start = new Date(now - 29 * 86400000);
  const mid   = new Date(now - 14 * 86400000);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  return [fmt(start), fmt(mid), 'Today'];
}

// Uptime calc
function calcUptime(bars) {
  const alive = bars.filter(b => b === 'alive').length;
  return ((alive / bars.length) * 100).toFixed(2);
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────

function buildTooltip24h(bar, svc, barIndex) {
  const status = bar;
  const evs = (EVENTS_24H[svc.id] || []).filter(e => e.bar === barIndex);
  const now = new Date();
  const barTime = new Date(now - (23 - barIndex) * 3600000);
  const timeLabel = `${String(barTime.getHours()).padStart(2,'0')}:00 – ${String((barTime.getHours()+1)%24).padStart(2,'0')}:00`;
  const colors = { alive: 'var(--alive)', down: 'var(--down)', unstable: 'var(--unstable)' };
  const labels = { alive: 'Operational', down: 'Outage', unstable: 'Degraded' };

  let evHTML = '';
  if (evs.length > 0) {
    evHTML = `<ul class="tooltip-event-list">` + evs.map(e =>
      `<li><span class="ev-dot" style="background:${colors[e.status]}"></span>
       <div><div class="ev-title">${e.title}</div>${e.desc}</div></li>`
    ).join('') + `</ul>`;
  }

  return `
    <div class="tooltip">
      <div class="tooltip-time">${timeLabel}</div>
      <div class="tooltip-status">
        <span class="dot" style="background:${colors[status]}"></span>
        <span style="color:${colors[status]}">${labels[status]}</span>
      </div>
      ${evHTML}
    </div>`;
}

function buildTooltipMulti(bars, svc, barIndex, rangeLabel) {
  const status = bars[barIndex];
  const colors = { alive: 'var(--alive)', down: 'var(--down)', unstable: 'var(--unstable)' };
  const labels = { alive: 'Operational', down: 'Outage', unstable: 'Degraded' };

  // Simulate events for 72h/30d bars
  const eventLibrary72 = [
    'TLS handshake failures',
    'DNS resolution timeout',
    'Health check returning 503',
    'Connection pool saturated',
    'Packet loss detected on link',
  ];
  const eventLibrary30 = [
    'Full service outage — network partition',
    'Scheduled maintenance window',
    'Database failover event',
    'DDoS mitigation — temporary block',
    'SSL certificate renewal disruption',
  ];
  const lib = rangeLabel === '72h' ? eventLibrary72 : eventLibrary30;
  const unitLabel = rangeLabel === '72h' ? '3-hour block' : 'Day';
  const unitIndex = barIndex + 1;

  let evHTML = '';
  if (status === 'down') {
    const events = lib.slice(0, 2);
    evHTML = `<ul class="tooltip-event-list">` + events.map(e =>
      `<li><span class="ev-dot" style="background:var(--down)"></span>
       <div><div class="ev-title">${e}</div></div></li>`
    ).join('') + `</ul>`;
  }

  return `
    <div class="tooltip" style="white-space:normal;min-width:200px;">
      <div class="tooltip-time">${unitLabel} ${unitIndex}</div>
      <div class="tooltip-status">
        <span class="dot" style="background:${colors[status]}"></span>
        <span style="color:${colors[status]}">${labels[status]}</span>
      </div>
      ${evHTML}
    </div>`;
}

function renderServiceCard(svc, bars, axisLabels, mode) {
  const uptime = calcUptime(bars);
  const evs24 = EVENTS_24H[svc.id] || [];

  const barsHTML = bars.map((status, i) => {
    let tooltip = '';
    if (mode === '24h') {
      tooltip = buildTooltip24h(status, svc, i);
      return `<div class="bar ${status}" style="height:${barHeight(status, mode)}px">${tooltip}</div>`;
    } else {
      tooltip = buildTooltipMulti(bars, svc, i, mode);
      return `<div class="bar ${status}" style="height:${barHeight(status, mode)}px">${tooltip}</div>`;
    }
  }).join('');

  const countDown = bars.filter(b => b === 'down').length;
  const countUnstable = bars.filter(b => b === 'unstable').length;

  let summaryHTML = `<div class="legend-item"><div class="legend-swatch" style="background:var(--alive)"></div>${uptime}% uptime</div>`;
  if (countDown > 0)     summaryHTML += `<div class="legend-item"><div class="legend-swatch" style="background:var(--down)"></div>${countDown} outage</div>`;
  if (mode === '24h' && countUnstable > 0) summaryHTML += `<div class="legend-item"><div class="legend-swatch" style="background:var(--unstable)"></div>${countUnstable} degraded</div>`;

  return `
  <div class="service-card">
    <div class="service-header">
      <div class="service-info">
        <div class="service-icon" style="background:${svc.iconBg}">${svc.icon}</div>
        <div>
          <div class="service-name">${svc.name}</div>
          <div class="service-endpoint">${svc.endpoint}</div>
        </div>
      </div>
      <div class="uptime-label">${uptime}%</div>
    </div>
    <div class="bar-container">
      <div class="bars-row">${barsHTML}</div>
      <div class="bar-axis">
        <span>${axisLabels[0]}</span>
        <span>${axisLabels[1]}</span>
        <span>${axisLabels[2]}</span>
      </div>
    </div>
    <div class="summary-row">${summaryHTML}</div>
  </div>`;
}

function barHeight(status, mode) {
  if (mode === '24h') {
    return status === 'alive' ? 28 : status === 'down' ? 28 : 28;
  }
  return status === 'down' ? 28 : 28;
}

function renderView(viewId, mode) {
  const container = document.getElementById(viewId);
  let html = '';

  SERVICES.forEach(svc => {
    let bars, axis;
    if (mode === '24h') { bars = gen24hBars(svc.id); axis = get24hAxis(); }
    else if (mode === '72h') { bars = gen72hBars(svc.id); axis = get72hAxis(); }
    else { bars = gen30dBars(svc.id); axis = get30dAxis(); }
    html += renderServiceCard(svc, bars, axis, mode);
  });

  container.innerHTML = html;
}

function switchView(mode, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${mode}`).classList.add('active');
}

// Init all views
renderView('view-24h', '24h');
renderView('view-72h', '72h');
renderView('view-30d', '30d');
</script>

</body>
</html>
